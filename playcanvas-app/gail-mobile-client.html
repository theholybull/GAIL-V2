    async function loadContainerEntity(pc, app, url, name, { retries = MOBILE_CONTAINER_LOAD_RETRIES, timeoutMs = MOBILE_CONTAINER_LOAD_TIMEOUT_MS } = {}) {
      let attempt = 0;
      console.log(`[container-load] START: ${name} from ${url} (timeout: ${timeoutMs}ms, retries: ${retries})`);
      while (attempt <= retries) {
        try {
          return await new Promise((resolve, reject) => {
            let settled = false;
            const asset = new pc.Asset(`${name}-${attempt}`, "container", { url });
            const cleanup = () => {
              clearTimeout(timer);
              asset.off();
              app.assets.remove(asset);
            };
            const fail = (error) => {
              if (settled) return;
              settled = true;
              cleanup();
              console.log(`[container-load] FAILED: ${name} - ${error.message}`);
              reject(error instanceof Error ? error : new Error(String(error || "Container load failed")));
            };
            const succeed = (entity) => {
              if (settled) return;
              settled = true;
              cleanup();
              console.log(`[container-load] SUCCESS: ${name}`);
              resolve(entity);
            };

            const timer = setTimeout(() => {
              fail(new Error(`Timed out loading ${name}`));
            }, timeoutMs);

            app.assets.add(asset);
            asset.once("error", (err) => fail(new Error(String(err || "Container load failed"))));
            asset.ready(() => {
              try {
                const entity = asset.resource.instantiateRenderEntity();
                succeed(entity);
              } catch (err) {
                fail(err);
              }
            });
            app.assets.load(asset);
          });
        } catch (error) {
          attempt += 1;
          if (attempt > retries) {
            throw error;
          }
          console.log(`[container-load] RETRY ${attempt}/${retries}: ${name}`);
        }
      }
      throw new Error(`Failed loading ${name}`);
    }

    async function loadAnimationTrack(pc, app, url, name) {
      return await new Promise((resolve) => {
        const asset = new pc.Asset(name, "container", { url });
        app.assets.add(asset);
        asset.once("error", () => resolve(undefined));
        asset.ready(() => {
          try {
            const clip = asset?.resource?.animations?.[0]?.resource;
            resolve(clip);
          } catch {
            resolve(undefined);
          }
        });
        app.assets.load(asset);
      });
    }

    function collectEntityBounds(entity) {
      const renders = entity?.findComponents?.("render") || [];
      let minX = Number.POSITIVE_INFINITY;
      let minY = Number.POSITIVE_INFINITY;
      let minZ = Number.POSITIVE_INFINITY;
      let maxX = Number.NEGATIVE_INFINITY;
      let maxY = Number.NEGATIVE_INFINITY;
      let maxZ = Number.NEGATIVE_INFINITY;

      for (const render of renders) {
        for (const mesh of render.meshInstances || []) {
          const aabb = mesh?.aabb;
          if (!aabb) {
            continue;
          }
          const cx = aabb.center.x;
          const cy = aabb.center.y;
          const cz = aabb.center.z;
          const ex = aabb.halfExtents.x;
          const ey = aabb.halfExtents.y;
          const ez = aabb.halfExtents.z;
          minX = Math.min(minX, cx - ex);
          minY = Math.min(minY, cy - ey);
          minZ = Math.min(minZ, cz - ez);
          maxX = Math.max(maxX, cx + ex);
          maxY = Math.max(maxY, cy + ey);
          maxZ = Math.max(maxZ, cz + ez);
        }
      }

      if (!Number.isFinite(minX) || !Number.isFinite(maxX)) {
        return null;
      }

      return {
        minX,
        minY,
        minZ,
        maxX,
        maxY,
        maxZ,
        sizeX: Math.max(0.0001, maxX - minX),
        sizeY: Math.max(0.0001, maxY - minY),
        sizeZ: Math.max(0.0001, maxZ - minZ),
        centerX: (minX + maxX) * 0.5,
        centerY: (minY + maxY) * 0.5,
        centerZ: (minZ + maxZ) * 0.5,
      };
    }

    function applyStageCameraPlacement(camera, avatarEntity) {
      const bounds = collectEntityBounds(avatarEntity);
      if (bounds?.sizeY) {
        const targetX = bounds.centerX;
        const targetZ = bounds.centerZ;
        const cameraY = bounds.minY + bounds.sizeY * MOBILE_STAGE_CAMERA_FRAMING.cameraYRatio;
        const lookAtY = bounds.minY + bounds.sizeY * MOBILE_STAGE_CAMERA_FRAMING.lookAtYRatio;
        const halfFramed = Math.max(
          MOBILE_STAGE_CAMERA_FRAMING.minHalfFramedHeight,
          bounds.sizeY * MOBILE_STAGE_CAMERA_FRAMING.framedHeightRatio,
        );
        const fovRad = ((camera.camera?.fov || 38) * Math.PI) / 180;
        const distance = Math.max(
          MOBILE_STAGE_CAMERA_FRAMING.minDistance,
          halfFramed / Math.tan(fovRad * 0.5) * MOBILE_STAGE_CAMERA_FRAMING.distanceScale,
        );

        camera.setLocalPosition(targetX, cameraY, targetZ + distance);
        camera.lookAt(targetX, lookAtY, targetZ);
        return;
      }

      camera.setLocalPosition(
        MOBILE_STAGE_CAMERA_POSITION[0],
        MOBILE_STAGE_CAMERA_POSITION[1],
        MOBILE_STAGE_CAMERA_POSITION[2],
      );
      camera.lookAt(
        MOBILE_STAGE_CAMERA_TARGET[0],
        MOBILE_STAGE_CAMERA_TARGET[1],
        MOBILE_STAGE_CAMERA_TARGET[2],
      );
    }

    function placeAvatarForStage(root, avatarEntity) {
      const candidateEuler = [
        [0, 0, 0],
        [-90, 0, 0],
        [90, 0, 0],
        [0, 90, 0],
        [0, -90, 0],
        [0, 180, 0],
      ];

      let best = null;
      for (const euler of candidateEuler) {
        root.setLocalPosition(
          MOBILE_STAGE_AVATAR_POSITION[0],
          MOBILE_STAGE_AVATAR_POSITION[1],
          MOBILE_STAGE_AVATAR_POSITION[2],
        );
        root.setLocalEulerAngles(euler[0], euler[1], euler[2]);
        root.setLocalScale(1, 1, 1);
        const bounds = collectEntityBounds(avatarEntity);
        if (!bounds) continue;
        const score = bounds.sizeY - Math.max(bounds.sizeX, bounds.sizeZ) * 0.2;
        if (!best || score > best.score) {
          best = { euler, bounds, score };
        }
      }

      if (!best) {
        root.setLocalPosition(
          MOBILE_STAGE_AVATAR_POSITION[0],
          MOBILE_STAGE_AVATAR_POSITION[1],
          MOBILE_STAGE_AVATAR_POSITION[2],
        );
        root.setLocalEulerAngles(
          MOBILE_STAGE_AVATAR_ROTATION[0],
          MOBILE_STAGE_AVATAR_ROTATION[1],
          MOBILE_STAGE_AVATAR_ROTATION[2],
        );
        root.setLocalScale(
          MOBILE_STAGE_AVATAR_SCALE[0],
          MOBILE_STAGE_AVATAR_SCALE[1],
          MOBILE_STAGE_AVATAR_SCALE[2],
        );
        return;
      }

      const targetHeight = 1.72;
      const scale = Math.max(0.1, Math.min(3.5, targetHeight / Math.max(0.001, best.bounds.sizeY)));
      const feetY = best.bounds.minY * scale;
      const centerX = best.bounds.centerX * scale;
      const centerZ = best.bounds.centerZ * scale;
      const desiredFeetY = -0.14;

      root.setLocalEulerAngles(best.euler[0], best.euler[1], best.euler[2]);
      root.setLocalScale(scale, scale, scale);
      root.setLocalPosition(
        MOBILE_STAGE_AVATAR_POSITION[0] - centerX,
        MOBILE_STAGE_AVATAR_POSITION[1] + (desiredFeetY - feetY),
        MOBILE_STAGE_AVATAR_POSITION[2] - centerZ,
      );
    }

    function findEntityByName(root, name) {
      if (!root) {
        return null;
      }
      if (root.name === name) {
        return root;
      }
      for (const child of root.children || []) {
        const found = findEntityByName(child, name);
        if (found) {
          return found;
        }
      }
      return null;
    }

    function toCanonicalBoneName(name) {
      let canonical = name;
      while (/\.\d{3}$/.test(canonical)) {
        canonical = canonical.replace(/\.\d{3}$/, "");
      }
      return canonical;
    }

    function buildSkeletonBoneLookup(root) {
      const exact = new Map();
      const canonical = new Map();
      const walk = (entity) => {
        const name = entity?.name;
        if (name) {
          exact.set(name, entity);
          const canonicalName = toCanonicalBoneName(name);
          if (!canonical.has(canonicalName)) canonical.set(canonicalName, entity);
        }
        for (const child of entity?.children ?? []) walk(child);
      };
      walk(root);
      return { exact, canonical };
    }

    function bindGarmentToSkeleton(garmentRoot, bodyRoot, skeletonRoot) {
      const targetRoot = skeletonRoot ?? bodyRoot;
      const skeletonLookup = buildSkeletonBoneLookup(targetRoot);
      // Set rootBone on all render components in the garment
      for (const rc of garmentRoot.findComponents?.("render") ?? []) {
        rc.rootBone = targetRoot;
      }
      function walk(entity) {
        if (entity.render?.meshInstances) {
          for (const mi of entity.render.meshInstances) {
            if (mi.skinInstance?.skin?.boneNames) {
              mi.skinInstance.resolve(targetRoot, entity);
              const boneNames = mi.skinInstance.skin.boneNames;
              const resolvedBones = mi.skinInstance.bones;
              for (let i = 0; i < boneNames.length; i++) {
                if (resolvedBones[i]) continue;
                const requested = boneNames[i];
                const replacement = skeletonLookup.exact.get(requested)
                  ?? skeletonLookup.canonical.get(toCanonicalBoneName(requested));
                if (replacement) resolvedBones[i] = replacement;
              }
            }
          }
        }
        for (const child of entity.children ?? []) walk(child);
      }
      walk(garmentRoot);
    }

    function resolveSkeletonRoot(bodyRoot) {
      const bones = [];
      for (const renderComponent of bodyRoot?.findComponents?.("render") ?? []) {
        for (const meshInstance of renderComponent.meshInstances ?? []) {
          const skinBones = meshInstance?.skinInstance?.bones;
          if (Array.isArray(skinBones)) {
            for (const bone of skinBones) {
              if (bone) bones.push(bone);
            }
          }
        }
      }
      if (bones.length === 0) {
        return findEntityByName(bodyRoot, "hip") ?? bodyRoot;
      }
      const uniqueBones = Array.from(new Set(bones));
      const isAncestorOf = (ancestor, node) => {
        let cursor = node;
        while (cursor) {
          if (cursor === ancestor) return true;
          cursor = cursor.parent;
        }
        return false;
      };
      let candidate = uniqueBones[0];
      while (
        candidate?.parent &&
        candidate.parent !== bodyRoot &&
        uniqueBones.every((bone) => isAncestorOf(candidate.parent, bone))
      ) {
        candidate = candidate.parent;
      }
      return candidate ?? findEntityByName(bodyRoot, "hip") ?? bodyRoot;
    }

    function rebindEntityRenderRootBone(entity, rootBone) {
      if (!entity || !rootBone) return;
      for (const renderComponent of entity.findComponents?.("render") ?? []) {
        renderComponent.rootBone = rootBone;
      }
    }

    function bindAvatarAnimation(avatarEntity, idleTrack, talkTrack, listenTrack) {
      if (!idleTrack) return null;
      try {
        avatarEntity.addComponent("anim", { activate: true, speed: 1 });
      } catch {
        return null;
      }
      const anim = avatarEntity.anim;
      if (!anim) return null;
      const skeletonRoot = resolveSkeletonRoot(avatarEntity);
      rebindEntityRenderRootBone(avatarEntity, skeletonRoot);
      anim.rootBone = skeletonRoot;
      anim.assignAnimation("idle", idleTrack);
      anim.assignAnimation("talk", talkTrack || idleTrack);
      anim.assignAnimation("listen", listenTrack || idleTrack);
      anim.baseLayer?.play("idle");
      try { anim.rebind?.(); } catch { /* ignore */ }
      return { anim, skeletonRoot };
    }

    function getMaterialUsage(name) {
      if (!name) return "clothing";
      const n = name.toLowerCase();
      if (n.includes("hair") || n.includes("strand") || n.includes("eyebrow") || n.includes("eyelash")) return "hair";
      if (n.includes("skin") || n.includes("torso") || n.includes("face") || n.includes("lips") || n.includes("ears") || n.includes("legs") || n.includes("arms")) return "body";
      if (n.includes("ring") || n.includes("necklace") || n.includes("bracelet") || n.includes("earring") || n.includes("jewel") || n.includes("metal")) return "accessory";
      return "clothing";
    }

    function patchAvatarMaterials(pc, entity) {
      for (const renderComponent of entity?.findComponents?.("render") ?? []) {
        for (const meshInstance of renderComponent.meshInstances ?? []) {
          const sourceMaterial = meshInstance.material;
          if (!sourceMaterial?.clone) continue;

          const materialName = String(sourceMaterial.name ?? "");
          if (SENSITIVE_FACE_MATERIAL_NAME_PATTERN.test(materialName)) {
            continue;
          }

          const usage = getMaterialUsage(materialName);
          const profile = MATERIAL_PROFILE_BY_USAGE[usage] || MATERIAL_PROFILE_BY_USAGE.clothing;
          const isAlphaMaterial = typeof sourceMaterial.blendType === "number" && sourceMaterial.blendType !== pc.BLEND_NONE;
          const material = sourceMaterial.clone();

          if (typeof material.gloss === "number") {
            material.gloss = Math.min(material.gloss, profile.glossCap);
          }
          if (typeof material.shininess === "number") {
            material.shininess = Math.min(material.shininess, profile.shininessCap);
          }
          if (typeof material.metalness === "number") {
            material.metalness = 0;
          }
          if (typeof material.useMetalness === "boolean") {
            material.useMetalness = false;
          }
          if (typeof material.specularityFactor === "number") {
            material.specularityFactor = Math.min(material.specularityFactor, profile.specularityCap);
          }
          if (pc?.Color && "specular" in material) {
            material.specular = new pc.Color(profile.specularColor, profile.specularColor, profile.specularColor);
          }
          if (typeof material.reflectivity === "number") {
            material.reflectivity = 0;
          }
          if (typeof material.clearCoat === "number") {
            material.clearCoat = 0;
          }
          if (typeof material.clearCoatGloss === "number") {
            material.clearCoatGloss = 0;
          }
          if (typeof material.sheen === "number") {
            material.sheen = 0;
          }
          if (typeof material.sheenGloss === "number") {
            material.sheenGloss = 0;
          }
          if (!profile.allowNormalMap && "normalMap" in material) {
            material.normalMap = null;
          }
          if (usage === "hair") {
            material.blendType = pc.BLEND_NONE;
            material.alphaTest = 0.08;
            material.opacity = 1;
            material.depthWrite = true;
            material.cull = pc.CULLFACE_BACK;
          } else if (isAlphaMaterial && typeof sourceMaterial.opacity === "number") {
            material.opacity = sourceMaterial.opacity;
            material.blendType = pc.BLEND_NONE;
            material.depthWrite = true;
          } else {
            material.blendType = pc.BLEND_NONE;
            material.opacity = 1;
            material.depthWrite = true;
          }
          if ("emissive" in material && pc?.Color) {
            material.emissive = new pc.Color(0, 0, 0);
          }

          material.update?.();
          meshInstance.material = material;
        }
      }
    }

    // ── Facial animation layer (ported from work-lite-rebuild.ts) ─────────────

    function facialSetMorphWeight(morphInstance, key, value) {
      if (!morphInstance || !key) return;
      morphInstance.setWeight(key, Math.max(0, Math.min(1, value)));
    }

    function facialSetMorphWeights(morphInstance, keys, value) {
      if (!morphInstance || !keys || !keys.length) return;
      const clamped = Math.max(0, Math.min(1, value));
      for (const key of keys) morphInstance.setWeight(key, clamped);
    }

    function collectSpeechMorphTargets(entity) {
      const targets = [];
      for (const renderComponent of entity?.findComponents?.("render") ?? []) {
        for (const meshInstance of renderComponent.meshInstances ?? []) {
          const morphInstance = meshInstance?.morphInstance;
          const keys = Array.from(morphInstance?._weightMap?.keys?.() ?? []);
          if (!morphInstance || !keys.length) continue;
          const pickAny = (...needles) => keys.find((key) => {
            const n = key.toLowerCase();
            return needles.some((needle) => n.includes(needle.toLowerCase()));
          });
          targets.push({
            instance: morphInstance,
            mouthOpen: pickAny("ectrlmouthopen", "facs_rosamaria8_1_cbs_jawopen", "facs_rosamaria8_1_cbs_mouthfunnel"),
            aa: pickAny("ectrlvaa", "facs_ctrl_vaa"),
            ow: pickAny("ectrlvow", "facs_ctrl_vow", "facs_rosamaria8_1_cbs_mouthpucker"),
            ee: pickAny("ectrlvee", "facs_ctrl_vee", "facs_ctrl_viy"),
            ih: pickAny("ectrlvih", "facs_ctrl_vih", "facs_ctrl_veh"),
            fv: pickAny("ectrlvfv", "ectrlvf", "facs_ctrl_vf"),
            l: pickAny("ectrlvl", "facs_ctrl_vl"),
            th: pickAny("ectrlvth", "facs_ctrl_vth"),
            m: pickAny("ectrlvm", "facs_ctrl_vm", "facs_rosamaria8_1_cbs_mouthclose"),
            lowerLip: keys.filter((k) => { const n = k.toLowerCase(); return n.includes("lowerlip") || n.includes("mouthlowerdown") || n.includes("lowerlipdepress") || n.includes("lipdown"); }),
            chin: keys.filter((k) => { const n = k.toLowerCase(); return n.includes("chinraise") || n.includes("chinraiser") || n.includes("mentalis"); }),
            smileLeft: keys.filter((k) => { const n = k.toLowerCase(); return n.includes("smilel") || n.includes("mouthsmile_l") || n.includes("mouthsmileleft") || n.includes("lipcornerpullerl") || n.includes("grinl"); }),
            smileRight: keys.filter((k) => { const n = k.toLowerCase(); return n.includes("smiler") || n.includes("mouthsmile_r") || n.includes("mouthsmileright") || n.includes("lipcornerpullerr") || n.includes("grinr"); }),
          });
        }
      }
      return targets;
    }

    function collectEyeMorphTargets(entity) {
      const targets = [];
      for (const renderComponent of entity?.findComponents?.("render") ?? []) {
        for (const meshInstance of renderComponent.meshInstances ?? []) {
          const morphInstance = meshInstance?.morphInstance;
          const keys = Array.from(morphInstance?._weightMap?.keys?.() ?? []);
          if (!morphInstance || !keys.length) continue;
          const pickAll = (...patterns) => keys.filter((k) => { const n = k.toLowerCase(); return patterns.some((p) => n.includes(p)); });
          const blinkLeft  = pickAll("eyeblinkl", "eyesclosedl", "eyelidclose_l", "blink_l");
          const blinkRight = pickAll("eyeblinkr", "eyesclosedr", "eyelidclose_r", "blink_r");
          const squintLeft  = pickAll("eyesquintl", "cheeksquintl");
          const squintRight = pickAll("eyesquintr", "cheeksquintr");
          if (!blinkLeft.length && !blinkRight.length && !squintLeft.length && !squintRight.length) continue;
          targets.push({
            instance: morphInstance,
            blinkLeft:  blinkLeft.length  ? blinkLeft  : blinkRight,
            blinkRight: blinkRight.length ? blinkRight : blinkLeft,
            squintLeft:  squintLeft.length  ? squintLeft  : undefined,
            squintRight: squintRight.length ? squintRight : undefined,
          });
        }
      }
      return targets;
    }

    function getLocalEulerSnapshot(entity) {
      const angles = entity?.getLocalEulerAngles?.();
      return angles ? { x: angles.x, y: angles.y, z: angles.z } : null;
    }

    function findAnyNamedEntity(root, ...names) {
      for (const name of names) {
        const entity = findEntityByName(root, name);
        if (entity) return entity;
      }
      return null;
    }

    function createFacialController(avatarEntity, app) {
      if (!app?.systems?.on) {
        const noop = () => {};
        return { setState: noop, setSpeechText: noop, setSpeechActive: noop, setSpeechLevel: noop, onSpeechBoundary: noop, destroy: noop };
      }

      const speechMorphTargets = collectSpeechMorphTargets(avatarEntity);
      const eyeMorphTargets    = collectEyeMorphTargets(avatarEntity);
      const headBone = findEntityByName(avatarEntity, "head");
      const neckBone = findEntityByName(avatarEntity, "neckUpper") ?? findEntityByName(avatarEntity, "neckLower");
      const spineBone = findEntityByName(avatarEntity, "spine1") ?? findEntityByName(avatarEntity, "spineUpper") ?? findEntityByName(avatarEntity, "abdomenUpper") ?? findEntityByName(avatarEntity, "spine");
      const jawBone = findAnyNamedEntity(avatarEntity, "jaw", "Jaw", "jaw_master", "JawMaster", "lowerJaw");
      const lEyeBone = findAnyNamedEntity(avatarEntity, "lEye", "LeftEye", "Eye_L");
      const rEyeBone = findAnyNamedEntity(avatarEntity, "rEye", "RightEye", "Eye_R");
      const headBaseAngles = getLocalEulerSnapshot(headBone);
      const neckBaseAngles = getLocalEulerSnapshot(neckBone);
      const spineBaseAngles = getLocalEulerSnapshot(spineBone);
      const jawBaseAngles = getLocalEulerSnapshot(jawBone);
      const lEyeBaseAngles = getLocalEulerSnapshot(lEyeBone);
      const rEyeBaseAngles = getLocalEulerSnapshot(rEyeBone);
      console.log(`[facial] speech morph targets: ${speechMorphTargets.length}, eye targets: ${eyeMorphTargets.length}`);
      console.log(`[facial] bones head=${headBone?.name || "none"} neck=${neckBone?.name || "none"} jaw=${jawBone?.name || "none"} spine=${spineBone?.name || "none"}`);
      if (speechMorphTargets.length) {
        const first = speechMorphTargets[0];
        console.log(`[facial] first target keys: mouthOpen=${first.mouthOpen} aa=${first.aa} ow=${first.ow} ee=${first.ee} m=${first.m}`);
      }

      let facialState = "idle";
      let speaking = false;
      let speechLevel = 0;
      let talkClock = 0;
      let talkAmount = 0;
      let faceIdleClock = 0;
      let idlePoseBlend = 1;
      let headLookRetargetIn = 0.8;
      let headLookYTarget = 0;
      let headLookYCurrent = 0;
      let talkNodSmoother = 0;
      let eyeDriftRetargetIn = 0.35;
      let eyeDriftXTarget = 0;
      let eyeDriftYTarget = 0;
      let eyeDriftXCurrent = 0;
      let eyeDriftYCurrent = 0;
      let breathPhase = Math.random() * Math.PI * 2;
      let breathRate = 0.28;
      let breathDepth = 0.9;
      let breathRetargetIn = 2.5;
      const speechMouthScale = 0.42;
      const speechJawScale = 0.34;

      // viseme smoothing state
      const visemeCurrent = { mouthOpen:0, aa:0, ow:0, ee:0, ih:0, fv:0, l:0, th:0, m:0, lowerLip:0, chin:0, smileLeft:0, smileRight:0 };

      // blink state
      let blinkPhase = 0;
      let blinkCooldown = 1.8 + Math.random() * 1.5;
      let blinkAmountCurrent = 0;

      // micro motion state
      const micro = {
        retargetIn: 0.25 + Math.random() * 0.8,
        mouthOpenCurrent: 0, mouthOpenTarget: 0,
        lowerLipCurrent: 0,  lowerLipTarget: 0,
        chinCurrent: 0,      chinTarget: 0,
        smileBaseCurrent: 0, smileBaseTarget: 0,
        smileAsymCurrent: 0, smileAsymTarget: 0,
        squintBaseCurrent: 0, squintBaseTarget: 0,
        squintAsymCurrent: 0, squintAsymTarget: 0,
        jawOpenCurrent: 0,   jawOpenTarget: 0,
        jawSwayCurrent: 0,   jawSwayTarget: 0,
      };

      const update = (dt) => {
        const isTalking  = facialState === "talk";
        const isListening = facialState === "listen";

        faceIdleClock += dt;
        talkClock += dt;
        const idlePoseTarget = (isTalking || isListening) ? 0 : 1;
        idlePoseBlend += (idlePoseTarget - idlePoseBlend) * Math.min(1, dt * 2.2);

        // talkAmount tracks current speech drive level
        const liveSpeech = speaking ? Math.max(0.18, Math.min(0.58, speechLevel)) : 0;
        const targetTalk = isTalking ? (liveSpeech || 0.24) : 0;
        talkAmount += (targetTalk - talkAmount) * Math.min(1, dt * 6);

        // ── micro motion retarget ──────────────────────────────────────────
        micro.retargetIn -= dt;
        if (micro.retargetIn <= 0) {
          micro.retargetIn = 0.7 + Math.random() * 2.0;
          const intensity = isTalking ? 0.5 : (isListening ? 0.7 : 0.9);
          const side = Math.random() < 0.5 ? -1 : 1;
          const expr  = Math.random();
          const smile = expr < 0.16 ? 0.055 + Math.random() * 0.05 : expr < 0.68 ? 0.018 + Math.random() * 0.047 : Math.random() * 0.032;
          const mouth = Math.random() < 0.22 ? Math.random() * 0.006 : Math.random() < 0.82 ? 0.006 + Math.random() * 0.018 : 0.024 + Math.random() * 0.019;
          micro.mouthOpenTarget = mouth * intensity;
          micro.lowerLipTarget  = (0.004 + Math.random() * 0.024) * intensity;
          micro.chinTarget      = (0.003 + Math.random() * 0.017) * intensity;
          micro.smileBaseTarget = smile * intensity;
          micro.smileAsymTarget = side * (0.002 + Math.random() * 0.016) * intensity;
          micro.squintBaseTarget = (0.012 + Math.random() * 0.034) * intensity;
          micro.squintAsymTarget = -side * Math.random() * 0.014 * intensity;
          micro.jawOpenTarget   = (0.05 + Math.random() * 0.41) * intensity;
          micro.jawSwayTarget   = side * (0.015 + Math.random() * 0.145) * intensity;
        }
        const slow = Math.min(1, dt * 1.55);
        const lip  = Math.min(1, dt * 2.15);
        micro.mouthOpenCurrent += (micro.mouthOpenTarget - micro.mouthOpenCurrent) * lip;
        micro.lowerLipCurrent  += (micro.lowerLipTarget  - micro.lowerLipCurrent)  * lip;
        micro.chinCurrent      += (micro.chinTarget      - micro.chinCurrent)      * lip;
        micro.smileBaseCurrent += (micro.smileBaseTarget - micro.smileBaseCurrent) * slow;
        micro.smileAsymCurrent += (micro.smileAsymTarget - micro.smileAsymCurrent) * slow;
        micro.squintBaseCurrent += (micro.squintBaseTarget - micro.squintBaseCurrent) * slow;
        micro.squintAsymCurrent += (micro.squintAsymTarget - micro.squintAsymCurrent) * slow;
        micro.jawOpenCurrent   += (micro.jawOpenTarget   - micro.jawOpenCurrent)   * lip;
        micro.jawSwayCurrent   += (micro.jawSwayTarget   - micro.jawSwayCurrent)   * slow;

        // ── viseme drive ──────────────────────────────────────────────────
        const pulse   = talkAmount > 0.001 ? (0.55 + 0.45 * Math.sin(talkClock * 16)) * talkAmount : 0;
        const aaPulse = talkAmount > 0.001 ? (0.50 + 0.50 * Math.sin(talkClock * 11)) * talkAmount : 0;
        const owPulse = talkAmount > 0.001 ? (0.50 + 0.50 * Math.sin(talkClock *  7 + 0.8)) * talkAmount : 0;
        const speakingSmile = isTalking ? Math.min(0.1, 0.03 + talkAmount * 0.08) : 0;

        const targetViseme = {
          mouthOpen: isTalking ? ((pulse * 0.92) + (micro.mouthOpenCurrent * 0.32)) * speechMouthScale : micro.mouthOpenCurrent,
          aa:  isTalking ? aaPulse * 0.72 * speechMouthScale : 0,
          ow:  isTalking ? owPulse * 0.52 * speechMouthScale : 0,
          ee:  isTalking ? aaPulse * 0.40 * speechMouthScale : 0,
          ih:  isTalking ? aaPulse * 0.32 * speechMouthScale : 0,
          fv:  isTalking ? pulse   * 0.30 * speechMouthScale : 0,
          l:   isTalking ? pulse   * 0.20 * speechMouthScale : 0,
          th:  isTalking ? pulse   * 0.22 * speechMouthScale : 0,
          m:   isTalking ? Math.max(0, 0.045 - pulse * 0.07) : 0,
          lowerLip: isTalking ? Math.min(0.14, (pulse * 0.14 + aaPulse * 0.10 + micro.lowerLipCurrent * 0.25) * speechMouthScale) : micro.lowerLipCurrent,
          chin:     isTalking ? Math.min(0.10, (pulse * 0.08 + owPulse  * 0.05 + micro.chinCurrent    * 0.25) * speechMouthScale) : micro.chinCurrent,
          smileLeft:  Math.min(0.24, micro.smileBaseCurrent + speakingSmile + micro.smileAsymCurrent),
          smileRight: Math.min(0.24, micro.smileBaseCurrent + speakingSmile - micro.smileAsymCurrent),
        };
        const vBlend = Math.min(1, dt * (isTalking ? 10 : 5.8));
        for (const k of Object.keys(visemeCurrent)) {
          visemeCurrent[k] += (targetViseme[k] - visemeCurrent[k]) * vBlend;
        }

        for (const t of speechMorphTargets) {
          facialSetMorphWeight(t.instance, t.mouthOpen, visemeCurrent.mouthOpen);
          facialSetMorphWeight(t.instance, t.aa,        visemeCurrent.aa);
          facialSetMorphWeight(t.instance, t.ow,        visemeCurrent.ow);
          facialSetMorphWeight(t.instance, t.ee,        visemeCurrent.ee);
          facialSetMorphWeight(t.instance, t.ih,        visemeCurrent.ih);
          facialSetMorphWeight(t.instance, t.fv,        visemeCurrent.fv);
          facialSetMorphWeight(t.instance, t.l,         visemeCurrent.l);
          facialSetMorphWeight(t.instance, t.th,        visemeCurrent.th);
          facialSetMorphWeight(t.instance, t.m,         visemeCurrent.m);
          facialSetMorphWeights(t.instance, t.lowerLip, visemeCurrent.lowerLip);
          facialSetMorphWeights(t.instance, t.chin,     visemeCurrent.chin);
          facialSetMorphWeights(t.instance, t.smileLeft,  visemeCurrent.smileLeft);
          facialSetMorphWeights(t.instance, t.smileRight, visemeCurrent.smileRight);
        }

        // ── blink ──────────────────────────────────────────────────────────
        if (blinkPhase > 0) {
          blinkPhase = Math.min(1, blinkPhase + dt / 0.18);
          if (blinkPhase >= 1) { blinkPhase = 0; blinkCooldown = 1.55 + Math.random() * 2.05; }
        } else if (blinkCooldown > 0) {
          blinkCooldown = Math.max(0, blinkCooldown - dt);
        } else {
          blinkPhase = Number.EPSILON;
        }
        const blinkPulse = blinkPhase > 0
          ? (blinkPhase < 0.5 ? blinkPhase / 0.5 : 1 - (blinkPhase - 0.5) / 0.5)
          : 0;
        const targetBlink = Math.min(0.86, blinkPulse * 1.55);
        blinkAmountCurrent += (targetBlink - blinkAmountCurrent) * Math.min(1, dt * 28);
        const microSquintL = Math.max(0, micro.squintBaseCurrent + micro.squintAsymCurrent);
        const microSquintR = Math.max(0, micro.squintBaseCurrent - micro.squintAsymCurrent);
        for (const t of eyeMorphTargets) {
          facialSetMorphWeights(t.instance, t.blinkLeft,   blinkAmountCurrent);
          facialSetMorphWeights(t.instance, t.blinkRight,  blinkAmountCurrent);
          facialSetMorphWeights(t.instance, t.squintLeft,  Math.min(1, blinkAmountCurrent * 0.34 + microSquintL));
          facialSetMorphWeights(t.instance, t.squintRight, Math.min(1, blinkAmountCurrent * 0.34 + microSquintR));
        }

        // Work-Lite bone overlay: keeps speech readable even when morphs are subtle.
        headLookRetargetIn -= dt;
        if (headLookRetargetIn <= 0) {
          headLookRetargetIn = 2.0 + Math.random() * 3.5;
          const magnitude = Math.random() < 0.35 ? 12 + Math.random() * 8 : 4 + Math.random() * 10;
          headLookYTarget = (Math.random() < 0.5 ? 1 : -1) * magnitude;
        }
        headLookYCurrent += (headLookYTarget - headLookYCurrent) * Math.min(1, dt * 1.2);

        breathRetargetIn -= dt;
        if (breathRetargetIn <= 0) {
          breathRetargetIn = 3.8 + Math.random() * 8.4;
          breathRate = 0.21 + Math.random() * 0.15;
          breathDepth = 0.62 + Math.random() * 0.56;
        }
        breathPhase += dt * breathRate * Math.PI * 2;
        const breathCycle = (Math.sin(breathPhase - Math.PI * 0.36) + 1) * 0.5;
        const breath = (Math.pow(breathCycle, 0.64) - Math.pow(1 - breathCycle, 1.45) * 0.18) * breathDepth * Math.max(0.2, idlePoseBlend);
        const chestLift = breath * 1.05 + (isTalking ? 0.18 + talkAmount * 0.14 : 0) + (isListening && !isTalking ? 0.08 : 0);

        const rawNod = isTalking ? Math.sin(faceIdleClock * 2.1) * (talkAmount * 2.2) : 0;
        talkNodSmoother += (rawNod - talkNodSmoother) * Math.min(1, dt * 3.5);
        const headForwardBias = 1.85;
        const neckForwardBias = 0.9;
        const spineForwardBias = 0.35;

        if (headBone?.setLocalEulerAngles && headBaseAngles) {
          const idleHeadForward = idlePoseBlend * 0.55;
          const headMicroX = Math.sin(faceIdleClock * 0.8) * 0.18;
          const headMicroZ = Math.sin(faceIdleClock * 1.15 + 0.6) * 0.12;
          headBone.setLocalEulerAngles(
            headBaseAngles.x + headForwardBias + idleHeadForward + talkNodSmoother + headMicroX - breath * 0.18,
            headBaseAngles.y + headLookYCurrent * 0.55,
            headBaseAngles.z + headMicroZ,
          );
        }
        if (neckBone?.setLocalEulerAngles && neckBaseAngles) {
          neckBone.setLocalEulerAngles(
            neckBaseAngles.x + neckForwardBias + idlePoseBlend * 0.24 + talkNodSmoother * 0.5 + Math.sin(faceIdleClock * 0.62 + 1.4) * 0.16,
            neckBaseAngles.y + headLookYCurrent * 0.35,
            neckBaseAngles.z,
          );
        }
        if (spineBone?.setLocalEulerAngles && spineBaseAngles) {
          spineBone.setLocalEulerAngles(
            spineBaseAngles.x + spineForwardBias + chestLift,
            spineBaseAngles.y + headLookYCurrent * 0.12,
            spineBaseAngles.z + Math.sin(faceIdleClock * 2.82 + 1.3) * 0.52 * idlePoseBlend,
          );
        }
        if (jawBone?.setLocalEulerAngles && jawBaseAngles) {
          const jawOpen = isTalking
            ? ((pulse * 8.2) + (aaPulse * 4.8) + (owPulse * 2.2)) * speechJawScale
            : micro.jawOpenCurrent;
          const jawSway = isTalking
            ? Math.sin(talkClock * 5.6 + 0.3) * talkAmount * 0.28
            : micro.jawSwayCurrent;
          jawBone.setLocalEulerAngles(
            jawBaseAngles.x + jawOpen,
            jawBaseAngles.y + jawSway,
            jawBaseAngles.z,
          );
        }

        eyeDriftRetargetIn -= dt;
        if (eyeDriftRetargetIn <= 0) {
          eyeDriftRetargetIn = 0.28 + Math.random() * 0.85;
          eyeDriftXTarget = (Math.random() * 2 - 1) * 1.8;
          eyeDriftYTarget = (Math.random() * 2 - 1) * 1.0;
        }
        const eyeDriftBlend = Math.min(1, dt * 5.5);
        eyeDriftXCurrent += (eyeDriftXTarget - eyeDriftXCurrent) * eyeDriftBlend;
        eyeDriftYCurrent += (eyeDriftYTarget - eyeDriftYCurrent) * eyeDriftBlend;
        if (lEyeBone?.setLocalEulerAngles && lEyeBaseAngles) {
          lEyeBone.setLocalEulerAngles(lEyeBaseAngles.x + eyeDriftYCurrent, lEyeBaseAngles.y + 4.0 + eyeDriftXCurrent, lEyeBaseAngles.z);
        }
        if (rEyeBone?.setLocalEulerAngles && rEyeBaseAngles) {
          rEyeBone.setLocalEulerAngles(rEyeBaseAngles.x + eyeDriftYCurrent, rEyeBaseAngles.y - 4.0 + eyeDriftXCurrent, rEyeBaseAngles.z);
        }
      };

      app.systems.on("postUpdate", update);

      return {
        setState(next) { facialState = next || "idle"; },
        setSpeechText(text) { /* text tracking reserved for future phoneme lookup */ },
        setSpeechActive(active) { speaking = Boolean(active); if (!speaking) speechLevel = 0; },
        setSpeechLevel(level) { speechLevel = Math.max(0, Math.min(1, Number(level) || 0)); },
        onSpeechBoundary() { /* reserved */ },
        destroy() { try { app.systems.off("postUpdate", update); } catch {} },
      };
    }

    async function bootAvatar() {
      setAvatarLoading("Loading avatar and outfit...", true);
      const bootLog = [];
      const logStep = (step, detail = "") => {
        const msg = `[boot] ${step}${detail ? ": " + detail : ""}`;
        console.log(msg);
        bootLog.push(msg);
      };
      const pc = await import("/vendor/playcanvas/build/playcanvas.mjs");
      logStep("PlayCanvas imported");

      // Configure Draco decoder before any GLB loads (required for KHR_draco_mesh_compression)
      pc.WasmModule.setConfig("DracoDecoderModule", {
        glueUrl:    "/gail-mobile/assets/draco/draco.wasm.js",
        wasmUrl:    "/gail-mobile/assets/draco/draco.wasm.wasm",
        fallbackUrl: "/gail-mobile/assets/draco/draco.js",
      });
      logStep("Draco decoder configured");

      const app = new pc.Application(canvas, {
        graphicsDeviceOptions: {
          alpha: true,
          antialias: true,
          preserveDrawingBuffer: false,
        },
      });
      app.setCanvasFillMode(pc.FILLMODE_NONE);
      app.setCanvasResolution(pc.RESOLUTION_AUTO);
      app.start();
      window.__pcApp = app;
      window.__pc = pc;

      const camera = new pc.Entity("mobile-camera");
      camera.addComponent("camera", {
        clearColor: new pc.Color(0.118, 0.118, 0.118, 0),
        nearClip: 0.1,
        farClip: 80,
        fov: 38,
      });
      app.root.addChild(camera);

      app.scene.ambientLight = new pc.Color(0.72, 0.68, 0.62);

      const key = new pc.Entity("key-light");
      key.addComponent("light", {
        type: "directional",
        color: new pc.Color(0.96, 0.96, 0.98),
        intensity: 1.5,
        castShadows: false,
      });
      key.setEulerAngles(36, 24, 0);
      app.root.addChild(key);

      const fill = new pc.Entity("fill-light");
      fill.addComponent("light", {
        type: "omni",
        color: new pc.Color(0.35, 0.43, 0.75),
        intensity: 1.8,
        range: 12,
        castShadows: false,
      });
      fill.setLocalPosition(-1.2, 1.65, 1.8);
      app.root.addChild(fill);

      const root = new pc.Entity("avatar-root");
      app.root.addChild(root);

      const assetRoot = await resolveAssetRoot();
      const isPhoneRoot = assetRoot === "gail_phone";
      setAvatarLoading(`Loading ${assetRoot} manifest...`, true);
      const manifest = await fetchJson(`/client/asset-manifest?assetRoot=${encodeURIComponent(assetRoot)}`);
      const bodyAsset = pickBundleAsset(manifest.assets ?? [], "base_avatar", "avatar", "base");
      if (!bodyAsset?.resolvedPath) {
        throw new Error(`Base avatar bundle missing for asset root: ${assetRoot}`);
      }

      const avatarUrl = toVersionedClientAssetUrl(bodyAsset);
      setAvatarLoading(`Loading ${assetRoot} avatar...`, true);
      const avatarEntity = await loadContainerEntity(pc, app, avatarUrl, `mobile-avatar-${bodyAsset.id || "base"}`);
      root.addChild(avatarEntity);
      patchAvatarMaterials(pc, avatarEntity);

      const skeletonRoot = resolveSkeletonRoot(avatarEntity);
      rebindEntityRenderRootBone(avatarEntity, skeletonRoot);

      const displayAssets = getDisplayAssets(manifest, bodyAsset.id);
      const skippedModules = [];
      for (const asset of displayAssets) {
        setAvatarLoading(`Loading ${asset.kind || "module"}: ${asset.id || "asset"}...`, true);
        const moduleUrl = toVersionedClientAssetUrl(asset);
        try {
          const moduleEntity = await loadContainerEntity(
            pc,
            app,
            moduleUrl,
            `mobile-module-${asset.id || "asset"}`,
            {
              // Optional modules should fail fast to avoid long apparent stalls on mobile networks.
              timeoutMs: asset.kind === "hair" ? 25000 : 20000,
              retries: 0,
            },
          );
          root.addChild(moduleEntity);
          bindGarmentToSkeleton(moduleEntity, avatarEntity, skeletonRoot);
          patchAvatarMaterials(pc, moduleEntity);
        } catch (error) {
          skippedModules.push(asset.id || asset.kind || "module");
          console.warn("Skipping module after load failure", asset.id, error);
        }
      }
      if (skippedModules.length) {
        showWarn(`Loaded with reduced outfit (${skippedModules.length} module${skippedModules.length === 1 ? "" : "s"} skipped).`);
      }

      // Defer one tick so mesh bounds and skin matrices are initialized.
      await new Promise((resolve) => requestAnimationFrame(resolve));
      placeAvatarForStage(root, avatarEntity);

      let animComponent = null;
      const facialController = createFacialController(avatarEntity, app);
      if (!isPhoneRoot) {
        const idle = await loadAnimationTrack(pc, app, IDLE_ANIM_URL, "anim-idle");
        const talk = await loadAnimationTrack(pc, app, TALK_ANIM_URL, "anim-talk");
        const listen = await loadAnimationTrack(pc, app, LISTEN_ANIM_URL, "anim-listen");

        const idleTrack = idle || talk || listen;
        const talkTrack = talk || idleTrack;
        const listenTrack = listen || idleTrack;

        if (!idleTrack) {
          throw new Error("Animation tracks failed to load.");
        }

        const bound = bindAvatarAnimation(avatarEntity, idleTrack, talkTrack, listenTrack);
        if (!bound?.anim || !bound?.skeletonRoot) {
          throw new Error("Avatar animation bind failed.");
        }
        animComponent = bound?.anim ?? null;

        // Some asset roots shift/scalebind after animation setup; re-stage once bound.
        placeAvatarForStage(root, avatarEntity);
      }

      applyStageCameraPlacement(camera, avatarEntity);
      logStep("Camera placed");

      window.__bootLog = bootLog;
      const setState = (state) => {
        facialController.setState(state);
        if (!animComponent?.baseLayer) return;
        // Preserve skeletal clip playback. Do not force this to idle: doing so
        // makes mobile appear stuck in rest/idle and hides rootBone binding bugs.
        if (state === "talk") {
          animComponent.baseLayer.transition("talk", 0.22);
        } else if (state === "listen") {
          animComponent.baseLayer.transition("listen", 0.22);
        } else {
          animComponent.baseLayer.transition("idle", 0.22);
        }
      };

      const ro = new ResizeObserver(() => resizeCanvas(app));
      ro.observe(sceneFrame);
      resizeCanvas(app);

      canvas.classList.add("ready");
      setAvatarLoading("", false);

      return {
        setState,
        setSpeechText: (text) => facialController.setSpeechText(text),
        setSpeechActive: (active) => facialController.setSpeechActive(active),
        setSpeechLevel: (level) => facialController.setSpeechLevel(level),
        onSpeechBoundary: (index) => facialController.onSpeechBoundary(index),
      };
    }

    addMessage("gail", "Hey. I am here.");
    avatar = await bootAvatar().catch(async (error) => {
      const message = error?.message || "Avatar load failed.";
      const bootLog = window.__bootLog || [];
      showWarn(message);
      setAvatarLoading("Avatar failed to load", true);
      await reportDiagnostic([
        `[mobile] avatar boot failed: ${message}`,
        `[mobile] ua: ${navigator.userAgent}`,
        `[mobile] platform: ${navigator.platform || "unknown"}`,
        `[mobile] quality: ${avatarQuality}`,
        `[mobile] href: ${location.href}`,
        ...bootLog,
      ]);
      return null;
    });
    window.__mobileAvatar = avatar;
  </script>
</body>
</html>
