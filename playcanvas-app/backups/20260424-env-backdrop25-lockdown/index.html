<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gail Work-Lite Client</title>
    <link rel="stylesheet" href="/client/styles/work-lite-rebuild.css?v=20260424-env-backdrop25" />
  </head>
  <body>
    <div id="app">
      <div style="padding:24px;color:#f7f2ea;font-family:'Trebuchet MS','Segoe UI',sans-serif;">
        Loading Gail work-lite client...
      </div>
    </div>
    <script type="module">
      import("/client/work-lite-rebuild.js?v=20260424-env-backdrop25").catch((error) => {
        const root = document.querySelector("#app");
        if (!root) {
          return;
        }

        const message = error instanceof Error
          ? `${error.message}\n\n${error.stack ?? ""}`
          : String(error);
        root.innerHTML = `
          <div style="padding:24px;color:#f7f2ea;font-family:'Trebuchet MS','Segoe UI',sans-serif;">
            <h1 style="margin:0 0 12px;">Client Boot Error</h1>
            <pre style="white-space:pre-wrap;word-break:break-word;background:rgba(0,0,0,0.35);padding:16px;border-radius:16px;">${message
              .replaceAll("&", "&amp;")
              .replaceAll("<", "&lt;")
              .replaceAll(">", "&gt;")}</pre>
          </div>
        `;
      });
    </script>
  </body>
</html>
