<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gail PlayCanvas Proof</title>
    <style>
      html, body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #0b1020;
        color: #f7f2ea;
        font-family: "Trebuchet MS", "Segoe UI", sans-serif;
      }

      #proof-canvas {
        display: block;
        width: 100vw;
        height: 100vh;
      }

      #proof-status {
        position: fixed;
        left: 16px;
        top: 16px;
        max-width: 420px;
        padding: 12px 14px;
        border-radius: 14px;
        background: rgba(10, 14, 24, 0.78);
        border: 1px solid rgba(255, 255, 255, 0.14);
        backdrop-filter: blur(10px);
        font-size: 14px;
        line-height: 1.35;
        z-index: 2;
      }

      #proof-status strong {
        display: block;
        margin-bottom: 6px;
        color: #f07e3d;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        font-size: 11px;
      }
    </style>
  </head>
  <body>
    <canvas id="proof-canvas"></canvas>
    <div id="proof-status">
      <strong>Proof Scene</strong>
      Booting PlayCanvas proof page...
    </div>
    <script type="module">
      import("/client/proof.js?v=20260320-proof1").catch((error) => {
        const status = document.querySelector("#proof-status");
        if (!status) {
          return;
        }

        const message = error instanceof Error ? `${error.message}\n\n${error.stack ?? ""}` : String(error);
        status.innerHTML = `<strong>Proof Error</strong><pre style="white-space:pre-wrap;margin:0;">${message
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")}</pre>`;
      });
    </script>
  </body>
</html>
