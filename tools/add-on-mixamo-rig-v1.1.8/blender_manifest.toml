schema_version = "1.0.0"

id = "mixamo_rig"
version = "1.1.8"
name = "Mixamo Rig"
tagline = "Generate a control rig from Mixamo Fbx skeleton"
maintainer = "BeyondDev (Tyler Walker) <tyler@beyondstudios.us>"
type = "add-on"

website = "https://github.com/tdw46/mixamo_blender4-main/tree/main"

tags = ["Import-Export", "Rigging"]

blender_version_min = "4.2.0"
blender_version_max = "5.5.999"

license = ["SPDX:GPL-3.0-or-later"]

copyright = [
  "2024 Adobe, Tyler Walker",
  "2021 Adobe",
]

# Build configuration to exclude unnecessary files
[build]
paths_exclude_pattern = [
  "__pycache__/",
  ".mypy_cache/",
  "/.git/",
  "/.github/",
  ".gitignore",
  ".gitattributes",
  "*.pyc",
  "*.pyo",
  "*.pyd",
  "*.zip",
  "*.log",
  "*.bat",
  ".DS_Store",
  "Thumbs.db",
  ".vscode/",
  ".idea/",
  "*.egg-info/",
  ".pytest_cache/",
  ".tox/",
  ".coverage",
  "*.sublime-*",
]